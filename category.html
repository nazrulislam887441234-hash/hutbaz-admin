<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Category - HUTBAZ Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
    --primary: #2563eb;
    --accent: #16a34a;
    --danger: #ef4444;
    --gradient: linear-gradient(135deg,#2563eb,#1e40af);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
    padding:20px;
    position:relative;
    overflow-x:hidden;
}

/* Background Blobs */
.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.15;
    animation:float 8s ease-in-out infinite;
    z-index:0;
}
.blob1{
    width:500px; height:500px;
    background:var(--gradient);
    top:-150px; left:-150px;
}
.blob2{
    width:400px; height:400px;
    background:linear-gradient(135deg, #16a34a, #2563eb);
    bottom:-100px; right:-100px;
    animation-delay:2s;
}
@keyframes float{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(30px, -30px) scale(1.1);}
}

.card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:550px;
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(25px) saturate(180%);
    padding:45px 40px;
    border-radius:28px;
    border:1px solid rgba(219,234,254,.5);
    box-shadow:0 25px 80px rgba(37,99,235,.15);
    animation:cardIn.8s cubic-bezier(.22,1,.36,1);
}
@keyframes cardIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}
h2{
    font-size:28px;
    font-weight:900;
    background:var(--gradient);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.logout{
    color:var(--danger);
    cursor:pointer;
    font-weight:800;
    padding:10px 18px;
    border-radius:12px;
    background:rgba(239,68,68,.1);
    transition:.3s;
    display:flex;align-items:center;gap:8px;
}
.logout:hover{background:var(--danger);color:#fff;}

label{
    font-weight:700;
    margin-top:20px;
    display:block;
    color:#475569;
    font-size:14px;
}
input[type="text"]{
    width:100%;
    padding:16px 18px;
    margin-top:10px;
    border-radius:14px;
    border:2px solid #dbeafe;
    background:#fff;
    color:#1e293b;
    font-size:16px;
    font-weight:600;
    transition:.3s;
}
input[type="text"]:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 5px rgba(37,99,235,.15);
}
#slug{
    background:rgba(22,163,74,.08);
    border-color:var(--accent);
    color:var(--accent);
}

/* Premium File Upload */
.upload-box{
    border:2px dashed var(--primary);
    border-radius:18px;
    padding:35px 25px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
    background:linear-gradient(135deg, rgba(37,99,235,.05), rgba(22,163,74,.05));
    margin-top:10px;
}
.upload-box:hover{
    border-color:var(--accent);
    background:linear-gradient(135deg, rgba(37,99,235,.1), rgba(22,163,74,.1));
    transform:translateY(-3px);
}
.upload-box i{
    font-size:50px;
    color:var(--primary);
    margin-bottom:12px;
}
.upload-box p{margin:5px 0;color:#64748b;font-weight:600;}
.upload-box b{color:var(--primary);font-size:16px;}
#image{display:none;}

#preview{
    width:100%;
    max-height:240px;
    object-fit:cover;
    border-radius:16px;
    margin-top:15px;
    display:none;
    border:3px solid var(--accent);
    box-shadow:0 8px 25px rgba(22,163,74,.2);
}
#compressInfo{
    font-size:13px;
    color:var(--accent);
    margin-top:10px;
    text-align:center;
    font-weight:700;
    display:none;
}

button{
    width:100%;
    padding:17px;
    margin-top:25px;
    background:var(--gradient);
    color:#fff;
    font-weight:800;
    font-size:17px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 8px 25px rgba(37,99,235,.3);
    display:flex;align-items:center;justify-content:center;gap:10px;
}
button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 35px rgba(37,99,235,.4);
}
button:active{transform:scale(.98);}

/* Custom Popup */
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);display:none;justify-content:center;align-items:center;z-index:999;animation:fadeIn.3s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.popup-box{background:#fff;padding:35px;border-radius:24px;width:90%;max-width:420px;text-align:center;transform:scale(.9);animation:scaleUp.3s forwards;box-shadow:0 25px 80px rgba(0,0,0,.3);}
@keyframes scaleUp{to{transform:scale(1);}}
.popup-icon{font-size:60px;margin-bottom:15px;}
.popup-box h3{font-size:22px;font-weight:900;margin-bottom:10px;}
.popup-box p{color:#64748b;margin-bottom:20px;font-weight:600;}
.popup-btn{padding:14px 35px;background:var(--gradient);border:none;border-radius:14px;color:#fff;font-weight:800;cursor:pointer;font-size:16px;}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
<div class="top-bar">
    <h2>Create Category</h2>
    <span class="logout" id="logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</span>
</div>

<form id="categoryForm">
    <label>Category Image</label>
    <div class="upload-box" id="uploadBox">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <p><b>Upload Image</b></p>
        <p>Click or Drag & Drop</p>
        <p style="font-size:12px;">Auto WebP Compression</p>
    </div>
    <input type="file" id="image" accept="image/*" required>
    <img id="preview">
    <div id="compressInfo"></div>

    <label>Category Name</label>
    <input type="text" id="name" placeholder="e.g: Smart Phones" required>

    <label>Category Slug</label>
    <input type="text" id="slug" placeholder="smart-phones" readonly>

    <button type="submit"><i class="fa-solid fa-save"></i> Save Category</button>
</form>
</div>

<!-- Custom Popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <div class="popup-icon" id="popupIcon"></div>
        <h3 id="popupTitle"></h3>
        <p id="popupMsg"></p>
        <button class="popup-btn" id="popupOk">OK</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const IMGBB_API_KEY = "6bf73ee25639931c6a8f44074740902c";
let compressedFile = null;

// Custom Popup
function showPopup(type, title, msg){
    const popup = document.getElementById('popup');
    const icon = document.getElementById('popupIcon');

    document.getElementById('popupTitle').innerText = title;
    document.getElementById('popupMsg').innerText = msg;

    if(type === 'success') icon.innerHTML = '<i class="fa-solid fa-circle-check" style="color:#16a34a;"></i>';
    if(type === 'loading') icon.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="color:#2563eb;"></i>';
    if(type === 'error') icon.innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:#ef4444;"></i>';

    popup.style.display = 'flex';
    document.getElementById('popupOk').onclick = () => popup.style.display = 'none';
}

// Auth Check
onAuthStateChanged(auth, user => {
  if(!user) window.location.href = "login.html";
})
document.getElementById('logout').onclick = () => signOut(auth);

// Slug Generator
document.getElementById('name').oninput = e => {
  let slug = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  document.getElementById('slug').value = slug;
}

// Upload Box
document.getElementById('uploadBox').onclick = () => document.getElementById('image').click();

// Drag Drop
const uploadBox = document.getElementById('uploadBox');
uploadBox.ondragover = e => {e.preventDefault(); uploadBox.style.borderColor = '#16a34a';}
uploadBox.ondragleave = () => {uploadBox.style.borderColor = '#2563eb';}
uploadBox.ondrop = e => {
    e.preventDefault();
    uploadBox.style.borderColor = '#2563eb';
    document.getElementById('image').files = e.dataTransfer.files;
    document.getElementById('image').dispatchEvent(new Event('change'));
}

// Image Compress to WebP
document.getElementById('image').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file) return;

  showPopup('loading', 'Compressing...', 'Please wait while we optimize your image');

  compressedFile = await compressImage(file, 1280, 0.8);

  const preview = document.getElementById('preview');
  preview.src = URL.createObjectURL(compressedFile);
  preview.style.display = 'block';

  const compressInfo = document.getElementById('compressInfo');
  compressInfo.innerHTML = `<i class="fa-solid fa-check-circle"></i> Compressed: ${(file.size/1024).toFixed(1)}KB → ${(compressedFile.size/1024).toFixed(1)}KB`;
  compressInfo.style.display = 'block';
  document.getElementById('popup').style.display = 'none';
}

function compressImage(file, maxWidth, quality){
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;

        if(width > maxWidth){
          height *= maxWidth / width;
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob((blob) => {
            const webpName = file.name.replace(/\.[^/.]+$/, "") + ".webp";
            resolve(new File([blob], webpName, {type: "image/webp", lastModified: Date.now()}));
        }, "image/webp", quality);
      }
    }
  });
};

// Upload to imgbb
async function uploadToImgBB(file){
  const formData = new FormData();
  formData.append("image", file);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method: "POST", body: formData});
  const data = await res.json();
  return data.data.url;
}

// Save to Firestore
document.getElementById('categoryForm').onsubmit = async (e) => {
  e.preventDefault();
  showPopup('loading', 'Saving...', 'Please wait while we save your category');

  try {
    const fileToUpload = compressedFile || document.getElementById('image').files[0];
    const imageUrl = await uploadToImgBB(fileToUpload);

    await addDoc(collection(db, "categories"), {
      name: document.getElementById('name').value,
      slug: document.getElementById('slug').value,
      image: imageUrl,
      createdAt: serverTimestamp(),
      createdBy: auth.currentUser.email
    });

    showPopup('success', 'Success!', 'Category saved successfully');
    e.target.reset();
    document.getElementById('preview').style.display = 'none';
    document.getElementById('compressInfo').style.display = 'none';
    compressedFile = null;
  } catch (err) {
    showPopup('error', 'Error!', err.message);
  }
}
</script>
</body>
</html>
