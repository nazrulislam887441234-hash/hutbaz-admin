<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - HUTBAZ</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
    --primary: #2563eb;
    --accent: #16a34a;
    --danger: #ef4444;
    --gradient: linear-gradient(135deg,#2563eb,#1e40af);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    font-family:'Poppins';
    background: radial-gradient(ellipse at center, #1e40af 0%, #0f172a 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    overflow:hidden;
}

/* Background Animation */
.bg-orb{
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle, rgba(37,99,235,.2) 0%, transparent 70%);
    filter:blur(80px);
    animation:pulse 4s ease-in-out infinite;
}
@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.2);}
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:420px;
    background:rgba(30,41,59,.8);
    backdrop-filter:blur(30px) saturate(180%);
    padding:45px 35px;
    border-radius:24px;
    border:1px solid rgba(37,99,235,.3);
    text-align:center;
    box-shadow:0 25px 80px rgba(0,0,0,.4);
    animation:cardIn.8s cubic-bezier(.22,1,.36,1);
}
@keyframes cardIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

/* Logo */
.logo{
    width:70px;
    height:70px;
    background:var(--gradient);
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 20px;
    font-size:32px;
    color:#fff;
    box-shadow:0 10px 30px rgba(37,99,235,.4);
}

h2{
    color:#fff;
    margin-bottom:8px;
    font-size:26px;
    font-weight:900;
}
.subtitle{
    color:#94a3b8;
    margin-bottom:30px;
    font-size:14px;
    font-weight:600;
}

.input-group{
    position:relative;
    margin-top:18px;
}
.input-group i{
    position:absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    color:#94a3b8;
    font-size:18px;
}
input{
    width:100%;
    padding:16px 16px 16px 50px;
    border-radius:14px;
    border:2px solid rgba(255,255,255,.1);
    background:rgba(0,0,0,.2);
    color:#fff;
    font-size:16px;
    font-weight:600;
    transition:.3s;
}
input:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(37,99,235,.2);
}
input::placeholder{color:#64748b;}

button{
    width:100%;
    padding:16px;
    margin-top:25px;
    background:var(--gradient);
    color:#fff;
    font-weight:800;
    font-size:17px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    transition:.3s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    box-shadow:0 8px 25px rgba(37,99,235,.3);
}
button:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 35px rgba(37,99,235,.4);
}
button:active{transform:scale(.98);}
button:disabled{opacity:.7;cursor:not-allowed;}

#error{
    color:var(--danger);
    margin-top:15px;
    font-weight:700;
    font-size:14px;
    display:none;
    background:rgba(239,68,68,.1);
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(239,68,68,.3);
}

.loading-spinner{
    display:none;
    width:20px;
    height:20px;
    border:3px solid rgba(255,255,255,.3);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="bg-orb"></div>

<div class="card">
    <div class="logo"><i class="fa-solid fa-store"></i></div>
    <h2>HUTBAZ Admin</h2>
    <p class="subtitle">Sign in to manage your store</p>
    
    <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="Email Address">
    </div>
    
    <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Password">
    </div>
    
    <button id="loginBtn">
        <span class="btn-text">Sign In</span>
        <div class="loading-spinner" id="spinner"></div>
    </button>
    
    <div id="error"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// If already logged in, redirect to dashboard
onAuthStateChanged(auth, user => {
  if(user) window.location.href = "dashboard.html";
})

document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const error = document.getElementById('error');
  const btn = document.getElementById('loginBtn');
  const btnText = btn.querySelector('.btn-text');
  const spinner = document.getElementById('spinner');
  
  error.style.display = 'none';
  btn.disabled = true;
  btnText.innerText = 'Signing In...';
  spinner.style.display = 'block';
  
  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "dashboard.html";
  } catch (err) {
    error.style.display = 'block';
    error.innerText = "❌ Invalid email or password";
    btn.disabled = false;
    btnText.innerText = 'Sign In';
    spinner.style.display = 'none';
  }
}

// Enter key support
document.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') document.getElementById('loginBtn').click();
})
</script>
</body>
</html>
