<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories - HUTBAZ Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#2563eb;--accent:#16a34a;--danger:#ef4444;--warning:#fbbf24;--gradient:linear-gradient(135deg,#2563eb,#1e40af);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);padding:20px;}

/* Background Blobs */
.blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.15;z-index:0;}
.blob1{width:500px;height:500px;background:var(--gradient);top:-150px;left:-150px;animation:float 8s ease-in-out infinite;}
.blob2{width:400px;height:400px;background:linear-gradient(135deg,#16a34a,#2563eb);bottom:-100px;right:-100px;animation:float 10s ease-in-out infinite reverse;}
@keyframes float{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,30px);}}

/* Navbar Premium */
.navbar{position:relative;z-index:2;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);padding:20px 30px;border-radius:18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;border:1px solid rgba(219,234,254,.5);box-shadow:0 10px 40px rgba(37,99,235,.1);}
.back-btn{color:var(--primary);font-weight:800;text-decoration:none;display:flex;align-items:center;gap:8px;font-size:15px;transition:.3s;}
.back-btn:hover{transform:translateX(-3px);}
.logout-btn{color:var(--danger);background:rgba(239,68,68,.1);padding:10px 18px;border-radius:12px;font-weight:800;cursor:pointer;border:none;font-size:14px;transition:.3s;display:flex;align-items:center;gap:8px;}
.logout-btn:hover{background:var(--danger);color:#fff;}

.container{position:relative;z-index:2;max-width:1300px;margin:0 auto;}

/* Search */
.search-box{width:100%;padding:18px 22px;border-radius:16px;border:2px solid rgba(37,99,235,.2);background:#fff;font-size:16px;margin-bottom:30px;font-weight:600;box-shadow:0 8px 30px rgba(37,99,235,.08);}
.search-box:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 5px rgba(37,99,235,.15);}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px;}
.card{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:22px;border:2px solid transparent;overflow:hidden;transition:.4s;box-shadow:0 10px 40px rgba(37,99,235,.1);}
.card:hover{transform:translateY(-8px);border-color:var(--primary);box-shadow:0 20px 60px rgba(37,99,235,.2);}
.card img{width:100%;height:190px;object-fit:cover;transition:.4s;}
.card:hover img{transform:scale(1.08);}
.card-body{padding:20px;}
.card-body h3{font-size:19px;margin-bottom:6px;color:#1e293b;font-weight:800;}
.card-body .slug{font-size:12px;color:var(--accent);background:rgba(22,163,74,.1);padding:4px 10px;border-radius:8px;display:inline-block;margin-bottom:15px;font-weight:700;}
.btn-group{display:flex;gap:10px;}
.btn{flex:1;padding:11px;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:14px;transition:.3s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-edit{background:var(--gradient);color:#fff;box-shadow:0 6px 20px rgba(37,99,235,.3);}
.btn-delete{background:rgba(239,68,68,.1);color:var(--danger);}
.btn:hover{transform:scale(1.05);}

.loading{text-align:center;padding:60px;font-size:18px;color:var(--primary);font-weight:800;}
.loading i{font-size:40px;margin-bottom:15px;animation:spin 1s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}

/* Custom Popup */
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);display:none;justify-content:center;align-items:center;z-index:999;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.popup-box{background:#fff;padding:35px;border-radius:24px;width:90%;max-width:400px;text-align:center;transform:scale(.9);animation:scaleUp .3s forwards;box-shadow:0 25px 80px rgba(0,0,0,.3);}
@keyframes scaleUp{to{transform:scale(1);}}
.popup-icon{font-size:60px;margin-bottom:15px;}
.popup-box h3{font-size:22px;font-weight:900;margin-bottom:10px;}
.popup-box p{color:#64748b;margin-bottom:20px;font-weight:600;}
.popup-btns{display:flex;gap:10px;}
.popup-btn{flex:1;padding:14px;border:none;border-radius:14px;font-weight:800;cursor:pointer;font-size:15px;transition:.3s;}
.btn-confirm{background:var(--gradient);color:#fff;}
.btn-cancel{background:#e2e8f0;color:#475569;}

/* Modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);justify-content:center;align-items:center;z-index:998;}
.modal-content{background:#fff;padding:35px;border-radius:24px;width:90%;max-width:500px;box-shadow:0 25px 80px rgba(0,0,0,.3);}
.modal-content h2{margin-bottom:20px;font-size:24px;font-weight:900;color:var(--primary);}
.modal-content input{width:100%;padding:15px;margin-bottom:15px;border:2px solid #dbeafe;border-radius:12px;font-size:15px;font-weight:600;}
.modal-content input:focus{outline:none;border-color:var(--primary);}
.modal-content img{width:100%;max-height:180px;object-fit:cover;border-radius:14px;margin-bottom:15px;border:2px solid #dbeafe;}
.modal-btns{display:flex;gap:10px;}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="navbar">
    <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    <button class="logout-btn" id="logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
</div>

<div class="container">
    <input type="text" class="search-box" id="search" placeholder="🔍 Search categories...">

    <div class="grid" id="categoryGrid">
        <div class="loading"><i class="fa-solid fa-spinner"></i><br>Loading Categories...</div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <h2><i class="fa-solid fa-pen-to-square"></i> Edit Category</h2>
        <img id="editPreview">
        <input type="file" id="editImage" accept="image/*">
        <input type="text" id="editName" placeholder="Category Name">
        <input type="text" id="editSlug" placeholder="Slug" readonly>
        <div class="modal-btns">
            <button class="btn btn-edit" id="saveBtn"><i class="fa-solid fa-save"></i> Save Changes</button>
            <button class="btn btn-delete" id="cancelBtn"><i class="fa-solid fa-xmark"></i> Cancel</button>
        </div>
    </div>
</div>

<!-- Custom Popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <div class="popup-icon" id="popupIcon"></div>
        <h3 id="popupTitle"></h3>
        <p id="popupMsg"></p>
        <div class="popup-btns" id="popupBtns">
            <button class="popup-btn btn-confirm" id="popupOk">OK</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const IMGBB_API_KEY = "66eddb56876c5803445f41302121a9b9";
let allCategories = [];
let editId = null;
let newImageFile = null;
let popupCallback = null;

// Auth Guard
onAuthStateChanged(auth, user => {
  if(!user) window.location.href = "index.html";
})
document.getElementById('logout').onclick = () => showPopup('warning', 'Logout?', 'Are you sure you want to logout?', true, () => signOut(auth));

// Custom Popup Function
function showPopup(type, title, msg, showCancel = false, callback = null){
    const popup = document.getElementById('popup');
    const icon = document.getElementById('popupIcon');
    const btns = document.getElementById('popupBtns');
    
    document.getElementById('popupTitle').innerText = title;
    document.getElementById('popupMsg').innerText = msg;
    
    if(type === 'success') icon.innerHTML = '<i class="fa-solid fa-circle-check" style="color:#16a34a;"></i>';
    if(type === 'warning') icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="color:#fbbf24;"></i>';
    if(type === 'danger') icon.innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:#ef4444;"></i>';
    
    if(showCancel){
        btns.innerHTML = `
            <button class="popup-btn btn-confirm" id="popupYes">Yes</button>
            <button class="popup-btn btn-cancel" id="popupNo">No</button>
        `;
        document.getElementById('popupYes').onclick = () => { popup.style.display = 'none'; if(callback) callback(); }
        document.getElementById('popupNo').onclick = () => popup.style.display = 'none';
    } else {
        btns.innerHTML = `<button class="popup-btn btn-confirm" id="popupOk">OK</button>`;
        document.getElementById('popupOk').onclick = () => popup.style.display = 'none';
    }
    
    popup.style.display = 'flex';
}

// Load Categories
async function loadCategories(){
    const snapshot = await getDocs(collection(db, "categories"));
    allCategories = snapshot.docs.map(doc => ({id: doc.id,...doc.data()}));
    renderCategories(allCategories);
}

function renderCategories(categories){
    const grid = document.getElementById('categoryGrid');
    if(categories.length === 0){
        grid.innerHTML = `<div class="loading"><i class="fa-solid fa-folder-open"></i><br>No Categories Found</div>`;
        return;
    }
    grid.innerHTML = categories.map(cat => `
        <div class="card">
            <img src="${cat.image}" alt="${cat.name}" loading="lazy">
            <div class="card-body">
                <h3>${cat.name}</h3>
                <span class="slug">/${cat.slug}</span>
                <div class="btn-group">
                    <button class="btn btn-edit" onclick='openEdit("${cat.id}")'><i class="fa-solid fa-pen"></i> Edit</button>
                    <button class="btn btn-delete" onclick='deleteCat("${cat.id}")'><i class="fa-solid fa-trash"></i> Delete</button>
                </div>
            </div>
        </div>
    `).join('');
}

// Search
document.getElementById('search').oninput = e => {
    const term = e.target.value.toLowerCase();
    const filtered = allCategories.filter(c => c.name.toLowerCase().includes(term) || c.slug.includes(term));
    renderCategories(filtered);
}

// Edit
window.openEdit = (id) => {
    editId = id;
    const cat = allCategories.find(c => c.id === id);
    document.getElementById('editName').value = cat.name;
    document.getElementById('editSlug').value = cat.slug;
    document.getElementById('editPreview').src = cat.image;
    document.getElementById('editModal').style.display = 'flex';
}

document.getElementById('editName').oninput = e => {
    document.getElementById('editSlug').value = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

document.getElementById('editImage').onchange = e => {
    newImageFile = e.target.files[0];
    document.getElementById('editPreview').src = URL.createObjectURL(newImageFile);
}

document.getElementById('cancelBtn').onclick = () => {
    document.getElementById('editModal').style.display = 'none';
    newImageFile = null;
}

document.getElementById('saveBtn').onclick = async () => {
    const name = document.getElementById('editName').value;
    const slug = document.getElementById('editSlug').value;
    let imageUrl = document.getElementById('editPreview').src;

    if(newImageFile){
        const formData = new FormData();
        formData.append("image", newImageFile);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method:"POST",body:formData});
        const data = await res.json();
        imageUrl = data.data.url;
    }

    await updateDoc(doc(db, "categories", editId), {name, slug, image: imageUrl});
    showPopup('success', 'Success!', 'Category updated successfully');
    document.getElementById('editModal').style.display = 'none';
    loadCategories();
    newImageFile = null;
}

// Delete
window.deleteCat = (id) => {
    showPopup('danger', 'Delete Category?', 'This action cannot be undone', true, async () => {
        await deleteDoc(doc(db, "categories", id));
        showPopup('success', 'Deleted!', 'Category deleted successfully');
        loadCategories();
    });
}

loadCategories();
</script>
</body>
</html>
