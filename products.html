<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product - HUTBAZ Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#2563eb;--accent:#16a34a;--danger:#ef4444;--gradient:linear-gradient(135deg,#2563eb,#1e40af);--bg1:#0f172a;--bg2:#1e293b;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);padding:20px;color:#e2e8f0;}

.card{max-width:850px;margin:20px auto;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);padding:40px;border-radius:28px;border:1px solid rgba(255,255,255,.1);box-shadow:0 25px 80px rgba(0,0,0,.3);}
h2{text-align:center;font-weight:900;margin-bottom:30px;font-size:28px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

label{font-weight:700;margin-top:20px;display:block;color:#94a3b8;font-size:14px;}
input,select,textarea{width:100%;padding:16px;margin-top:10px;border-radius:14px;border:2px solid rgba(255,255,255,.15);background:rgba(0,0,0,.3);color:#fff;font-size:16px;font-weight:600;transition:.3s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(37,99,235,.2);background:rgba(0,0,0,.4);}
textarea{min-height:140px;resize:vertical;}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

.upload-box{border:2px dashed var(--primary);border-radius:16px;padding:30px;text-align:center;cursor:pointer;background:rgba(37,99,235,.08);margin-top:10px;transition:.3s;font-weight:700;}
.upload-box:hover{background:rgba(37,99,235,.15);border-color:var(--accent);}
.upload-box i{font-size:40px;color:var(--primary);margin-bottom:10px;}

.upload-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;margin-top:18px;}
.img-wrap{position:relative;}
.preview-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:14px;border:3px solid var(--accent);}
.img-wrap.remove{position:absolute;top:-10px;right:-10px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-weight:900;font-size:18px;}

.keyword-box{display:flex;gap:10px;margin-top:10px;}
.btn-add{padding:16px 22px;background:var(--gradient);color:#fff;border:none;border-radius:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:8px;}
.keyword-list{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.keyword-tag{background:rgba(37,99,235,.2);padding:8px 14px;border-radius:20px;font-size:13px;display:flex;align-items:center;gap:8px;font-weight:700;border:1px solid rgba(37,99,235,.3);}
.keyword-tag span{cursor:pointer;color:var(--danger);font-weight:900;font-size:16px;}

#uploadBtn{background:#334155;cursor:not-allowed;width:100%;padding:18px;margin-top:30px;color:#fff;font-weight:800;font-size:17px;border:none;border-radius:15px;transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px;}
#uploadBtn.active{background:var(--gradient);cursor:pointer;color:#fff;box-shadow:0 8px 25px rgba(37,99,235,.3);}
#uploadBtn.active:hover{transform:translateY(-2px);}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
.top-bar a{color:var(--primary);font-weight:800;text-decoration:none;display:flex;align-items:center;gap:8px;}
.logout{color:var(--danger);cursor:pointer;font-weight:800;background:rgba(239,68,68,.15);padding:10px 18px;border-radius:12px;display:flex;align-items:center;gap:8px;}
.logout:hover{background:var(--danger);color:#fff;}

/* Custom Popup */
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);display:none;justify-content:center;align-items:center;z-index:999;animation:fadeIn.3s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.popup-box{background:#1e293b;padding:35px;border-radius:24px;width:90%;max-width:420px;text-align:center;transform:scale(.9);animation:scaleUp.3s forwards;border:1px solid rgba(255,255,255,.1);}
@keyframes scaleUp{to{transform:scale(1);}}
.popup-icon{font-size:60px;margin-bottom:15px;}
.popup-box h3{font-size:22px;font-weight:900;margin-bottom:10px;color:#fff;}
.popup-box p{color:#94a3b8;margin-bottom:20px;font-weight:600;}
.popup-btn{padding:14px 35px;background:var(--gradient);border:none;border-radius:14px;color:#fff;font-weight:800;cursor:pointer;font-size:16px;}
</style>
</head>
<body>

<div class="card">
<div class="top-bar">
    <a href="dashboard.html"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    <span class="logout" id="logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</span>
</div>

<h2><i class="fa-solid fa-box-open"></i> Add New Product</h2>

<form id="productForm">
    <label>Select Category *</label>
    <select id="category" required>
        <option value="">Loading categories...</option>
    </select>

    <div class="price-grid">
        <div>
            <label>Previous Price *</label>
            <input type="number" id="oldPrice" placeholder="25000" required>
        </div>
        <div>
            <label>Current Price *</label>
            <input type="number" id="currentPrice" placeholder="22000" required>
        </div>
    </div>

    <label>Product Name *</label>
    <input type="text" id="name" placeholder="e.g: iPhone 15 Pro Max" required>

    <label>Description *</label>
    <textarea id="description" placeholder="Write product details..." required></textarea>

    <label>Keywords</label>
    <div class="keyword-box">
        <input type="text" id="keywordInput" placeholder="Type keyword and press Add">
        <button type="button" class="btn-add" id="addKeyword"><i class="fa-solid fa-plus"></i> Add</button>
    </div>
    <div class="keyword-list" id="keywordList"></div>

    <label>Product Images * <small style="color:#94a3b8;">Unlimited - Auto WebP + Compress</small></label>
    <div class="upload-box" id="uploadBox">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <p><b>+ Add Images</b></p>
        <p style="font-size:12px;color:#94a3b8;">You can select multiple images at once</p>
    </div>
    <input type="file" id="image" accept="image/*" multiple style="display:none;">
    <div class="upload-grid" id="previewGrid"></div>

    <button type="submit" id="uploadBtn"><i class="fa-solid fa-upload"></i> Upload Product</button>
</form>
</div>

<!-- Custom Popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <div class="popup-icon" id="popupIcon"></div>
        <h3 id="popupTitle"></h3>
        <p id="popupMsg"></p>
        <button class="popup-btn" id="popupOk">OK</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyA7iGMmxsXkAP_zKqTECGHIV1bJQ0IpBF0",authDomain:"e-1commers.firebaseapp.com",projectId:"e-1commers",storageBucket:"e-1commers.firebasestorage.app",messagingSenderId:"943299209327",appId:"1:943299209327:web:852c9640ffd92ad0ca859a"};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const IMGBB_API_KEY = "6bf73ee25639931c6a8f44074740902c";

// Auth Guard
onAuthStateChanged(auth, user => {
    if(!user) window.location.href = "index.html";
})
document.getElementById('logout').onclick = () => signOut(auth);

let compressedFiles = [];
let keywords = [];

// Custom Popup
function showPopup(type, title, msg, redirect = false){
    const popup = document.getElementById('popup');
    const icon = document.getElementById('popupIcon');

    document.getElementById('popupTitle').innerText = title;
    document.getElementById('popupMsg').innerText = msg;

    if(type === 'success') icon.innerHTML = '<i class="fa-solid fa-circle-check" style="color:#16a34a;"></i>';
    if(type === 'loading') icon.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="color:#2563eb;"></i>';
    if(type === 'error') icon.innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:#ef4444;"></i>';

    popup.style.display = 'flex';
    document.getElementById('popupOk').onclick = () => {
        popup.style.display = 'none';
        if(redirect) window.location.href = "dashboard.html";
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadCategories(); // Fast Load with Cache
    initEvents();
})

function initEvents(){
    document.getElementById('uploadBox').onclick = () => document.getElementById('image').click();

    document.getElementById('image').onchange = async (e) => {
      const files = Array.from(e.target.files);
      if(!files.length) return;
      showPopup('loading', 'Compressing...', `Compressing ${files.length} images...`);

      for(let file of files){
        const compressed = await compressImage(file, 1280, 0.75);
        compressedFiles.push(compressed);
        addPreview(compressed);
      }
      document.getElementById('popup').style.display = 'none';
      checkForm();
      e.target.value = '';
    }

    document.getElementById('addKeyword').onclick = addKeywordFunc;
    document.getElementById('keywordInput').onkeypress = (e) => {
        if(e.key === 'Enter'){ e.preventDefault(); addKeywordFunc(); }
    }

    ['name','description','oldPrice','currentPrice','category'].forEach(id=>{
        document.getElementById(id).oninput = checkForm;
    })
    document.getElementById('category').onchange = checkForm;
    document.getElementById('productForm').onsubmit = handleSubmit;
}

function addPreview(file){
    const wrap = document.createElement('div');
    wrap.className = 'img-wrap';
    wrap.innerHTML = `
        <img src="${URL.createObjectURL(file)}" class="preview-img">
        <button type="button" class="remove">×</button>
    `;
    wrap.querySelector('.remove').onclick = () => {
        const index = compressedFiles.indexOf(file);
        compressedFiles.splice(index,1);
        wrap.remove();
        checkForm();
    }
    document.getElementById('previewGrid').appendChild(wrap);
}

function addKeywordFunc(){
    const val = document.getElementById('keywordInput').value.trim();
    if(val &&!keywords.includes(val)){
        keywords.push(val);
        renderKeywords();
        document.getElementById('keywordInput').value = '';
    }
}

function renderKeywords(){
    document.getElementById('keywordList').innerHTML = keywords.map((k,i) =>
        `<div class="keyword-tag">${k} <span onclick="removeKeyword(${i})">×</span></div>`
    ).join('');
}
window.removeKeyword = (i) => { keywords.splice(i,1); renderKeywords(); }

// FAST CATEGORY LOAD WITH CACHE
async function loadCategories(){
    const select = document.getElementById('category');

    // 1. Skeleton Loading দেখাও
    select.innerHTML = '<option value="">Loading categories...</option>';

    // 2. Cache Check করো
    const cached = localStorage.getItem('hutbaz_categories');
    const cacheTime = localStorage.getItem('hutbaz_categories_time');
    const now = new Date().getTime();

    // 1 ঘন্টার মধ্যে cache থাকলে সেটা use করো
    if(cached && cacheTime && (now - cacheTime) < 3600000){
        const cats = JSON.parse(cached);
        populateCategories(cats);
        return;
    }

    // 3. Cache না থাকলে Firebase থেকে টানো
    try {
        const snapshot = await getDocs(collection(db, "categories"));
        if(snapshot.empty){
            select.innerHTML = '<option value="">No categories found</option>';
            return;
        }
        const cats = snapshot.docs.map(doc => ({id: doc.id,...doc.data()}));
        cats.sort((a,b) => a.name.localeCompare(b.name));

        // Cache এ Save করো
        localStorage.setItem('hutbaz_categories', JSON.stringify(cats));
        localStorage.setItem('hutbaz_categories_time', now);

        populateCategories(cats);
    } catch(err){
        select.innerHTML = `<option value="">Error: ${err.message}</option>`;
    }
}

function populateCategories(cats){
    const select = document.getElementById('category');
    select.innerHTML = '<option value="">Select Category *</option>';
    cats.forEach(cat => {
        select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
    });
}

function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let width = img.width;
        let height = img.height;
        if (width > maxWidth) {
          height = height * (maxWidth / width);
          width = maxWidth;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          resolve(new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".webp", {type: "image/webp", lastModified: Date.now()}));
        }, "image/webp", quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function checkForm(){
    const name = document.getElementById('name').value;
    const desc = document.getElementById('description').value;
    const oldP = document.getElementById('oldPrice').value;
    const newP = document.getElementById('currentPrice').value;
    const cat = document.getElementById('category').value;
    const btn = document.getElementById('uploadBtn');
    if(compressedFiles.length > 0 && name && desc && oldP && newP && cat){
        btn.classList.add('active');
        btn.disabled = false;
    } else {
        btn.classList.remove('active');
        btn.disabled = true;
    }
}

async function handleSubmit(e){
  e.preventDefault();
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';

  try {
    let imageUrls = [];
    for(let i=0; i<compressedFiles.length; i++){
        showPopup('loading', 'Uploading...', `Uploading image ${i+1} of ${compressedFiles.length}`);
        const formData = new FormData();
        formData.append("image", compressedFiles[i]);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method:"POST",body:formData});
        const imgData = await res.json();
        imageUrls.push(imgData.data.url);
    }

    await addDoc(collection(db, "products"), {
      name: document.getElementById('name').value,
      description: document.getElementById('description').value,
      images: imageUrls,
      oldPrice: Number(document.getElementById('oldPrice').value),
      currentPrice: Number(document.getElementById('currentPrice').value),
      keywords: keywords,
      categoryId: document.getElementById('category').value,
      createdAt: serverTimestamp(),
      createdBy: auth.currentUser.email
    });

    // নতুন category add করলে cache clear করে দাও
    localStorage.removeItem('hutbaz_categories');
    localStorage.removeItem('hutbaz_categories_time');

    showPopup('success', 'Success!', 'Product uploaded successfully', true);
  } catch(err){
    showPopup('error', 'Error!', err.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-upload"></i> Upload Product';
  }
}
</script>
</body>
</html>
